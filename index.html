<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>InfinityLink</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f8fc;
    --surface: #ffffff;
    --border: #e4e6f0;
    --text-primary: #1a1c2e;
    --text-secondary: #7b7f9e;
    --blue: #4a6cf7;
    --green: #22c97a;
    --amber: #f7a94a;
    --radius: 20px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 1.25rem 1rem 1rem;
    width: 100%;
    max-width: 480px;
    text-align: center;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .header-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .header-brand {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-secondary);
    opacity: 0.6;
    white-space: nowrap;
  }

  .gauge-wrap {
    position: relative;
    width: min(300px, 86vw);
    margin: 0 auto 0.25rem;
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
  }

  .speed-display {
    position: absolute;
    bottom: 6%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    width: 70%;
  }

  .speed-num {
    font-family: 'DM Mono', monospace;
    font-size: clamp(30px, 9vw, 50px);
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1;
    letter-spacing: -2px;
  }

  .speed-unit {
    font-size: clamp(10px, 3vw, 13px);
    color: var(--text-secondary);
    margin-top: 3px;
    letter-spacing: 0.04em;
  }

  .phase-label {
    font-size: 13px;
    color: var(--text-secondary);
    min-height: 20px;
    margin-bottom: 0.875rem;
    letter-spacing: 0.02em;
  }

  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }

  .metric {
    background: var(--bg);
    border-radius: 14px;
    padding: 12px 6px 10px;
    border: 1px solid var(--border);
  }

  .metric-icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 6px;
  }

  .icon-dl  { background: #eef0fe; }
  .icon-ul  { background: #e8faf2; }
  .icon-ping{ background: #fff4e6; }

  .metric-label {
    font-size: clamp(9px, 2.5vw, 11px);
    color: var(--text-secondary);
    margin-bottom: 5px;
    letter-spacing: 0.04em;
  }

  .metric-val {
    font-family: 'DM Mono', monospace;
    font-size: clamp(13px, 4vw, 18px);
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1;
  }

  .metric-unit {
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 3px;
  }

  .ping-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 0.875rem;
  }

  .ping-mini {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 10px;
  }

  .ping-mini-label {
    font-size: clamp(9px, 2.5vw, 11px);
    color: var(--text-secondary);
    margin-bottom: 5px;
    letter-spacing: 0.04em;
  }

  .ping-mini-val {
    font-family: 'DM Mono', monospace;
    font-size: clamp(14px, 4vw, 18px);
    font-weight: 500;
    color: var(--text-primary);
  }

  .ping-mini-unit {
    font-size: 10px;
    color: var(--text-secondary);
  }

  .start-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: var(--blue);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .start-btn:hover  { background: #3a5ce0; }
  .start-btn:active { transform: scale(0.98); }
  .start-btn:disabled { background: #b0b8f0; cursor: not-allowed; }

  svg.arrow { width: 11px; height: 11px; }

  @media (min-width: 500px) {
    body { padding: 2rem; }
    .card { padding: 2.5rem 2rem 2rem; }
    .gauge-wrap { width: 300px; }
    .header { margin-bottom: 2rem; }
    .phase-label { margin-bottom: 1.5rem; }
    .metrics { gap: 10px; margin-bottom: 1.75rem; }
    .ping-row { gap: 10px; margin-bottom: 1.75rem; }
    .metric { padding: 14px 10px 12px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <span class="header-title">Проверка скорости</span>
    <span class="header-brand">infinitylink</span>
  </div>

  <div class="gauge-wrap">
    <canvas id="gauge" width="560" height="330"></canvas>
    <div class="speed-display">
      <div class="speed-num" id="numDisplay">0</div>
      <div class="speed-unit">Мбит/с</div>
    </div>
  </div>

  <div class="phase-label" id="phaseLabel">Нажмите «Начать» для теста</div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-icon icon-dl">
        <svg class="arrow" viewBox="0 0 10 10"><path d="M5 1v8M2 6l3 3 3-3" stroke="#4a6cf7" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="metric-label">СКАЧИВАНИЕ</div>
      <div class="metric-val" id="dlVal">—</div>
      <div class="metric-unit">Мбит/с</div>
    </div>
    <div class="metric">
      <div class="metric-icon icon-ul">
        <svg class="arrow" viewBox="0 0 10 10"><path d="M5 9V1M2 4l3-3 3 3" stroke="#22c97a" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="metric-label">ЗАГРУЗКА</div>
      <div class="metric-val" id="ulVal">—</div>
      <div class="metric-unit">Мбит/с</div>
    </div>
    <div class="metric">
      <div class="metric-icon icon-ping">
        <svg class="arrow" viewBox="0 0 10 10"><circle cx="5" cy="5" r="3" stroke="#f7a94a" stroke-width="1.5" fill="none"/><circle cx="5" cy="5" r="1" fill="#f7a94a"/></svg>
      </div>
      <div class="metric-label">ПИНГ</div>
      <div class="metric-val" id="pingVal">—</div>
      <div class="metric-unit">мс</div>
    </div>
  </div>

  <div class="ping-row">
    <div class="ping-mini">
      <div class="ping-mini-label">ДЖИТТЕР</div>
      <div><span class="ping-mini-val" id="jitterVal">—</span> <span class="ping-mini-unit">мс</span></div>
    </div>
    <div class="ping-mini">
      <div class="ping-mini-label">ПОТЕРИ ПАКЕТОВ</div>
      <div><span class="ping-mini-val" id="lossVal">—</span> <span class="ping-mini-unit">%</span></div>
    </div>
  </div>

  <button class="start-btn" id="startBtn">Начать тест</button>
</div>

<script>
const canvas = document.getElementById('gauge');
const ctx = canvas.getContext('2d');
const W = 560, H = 330;
const cx = W / 2, cy = H - 30;
const R = 220;
const startAngle = Math.PI;
const maxVal = 1000;
const ticks = [0,1,3,5,10,25,50,100,250,500,1000];

function valToAngle(v) {
  const logMax = Math.log10(maxVal + 1);
  const logV = Math.log10(Math.max(v, 0.01) + 1);
  return startAngle + (logV / logMax) * Math.PI;
}

function drawGauge(currentVal, phase) {
  ctx.clearRect(0, 0, W, H);
  const fillColor = phase === 'ul' ? '#22c97a' : phase === 'ping' ? '#f7a94a' : '#4a6cf7';

  ctx.beginPath();
  ctx.arc(cx, cy, R, startAngle, 2 * Math.PI);
  ctx.strokeStyle = '#e8eaf6';
  ctx.lineWidth = 28;
  ctx.lineCap = 'round';
  ctx.stroke();

  if (currentVal > 0) {
    const needleAngle = valToAngle(currentVal);
    ctx.beginPath();
    ctx.arc(cx, cy, R, startAngle, needleAngle);
    ctx.strokeStyle = fillColor;
    ctx.lineWidth = 28;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  ticks.forEach(t => {
    const a = valToAngle(t);
    const ix = cx + (R + 26) * Math.cos(a);
    const iy = cy + (R + 26) * Math.sin(a);
    ctx.font = '500 18px DM Sans, sans-serif';
    ctx.fillStyle = '#9b9fc0';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(t >= 1000 ? '1K' : String(t), ix, iy);
  });
}

function animateTo(from, to, duration, onUpdate, onDone) {
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    const val = from + (to - from) * ease;
    onUpdate(val);
    if (t < 1) requestAnimationFrame(step);
    else { onUpdate(to); if (onDone) onDone(); }
  }
  requestAnimationFrame(step);
}

drawGauge(0, 'dl');

const numDisplay  = document.getElementById('numDisplay');
const phaseLabel  = document.getElementById('phaseLabel');
const dlVal       = document.getElementById('dlVal');
const ulVal       = document.getElementById('ulVal');
const pingVal     = document.getElementById('pingVal');
const jitterVal   = document.getElementById('jitterVal');
const lossVal     = document.getElementById('lossVal');
const startBtn    = document.getElementById('startBtn');

const CF_DOWN    = 'https://speed.cloudflare.com/__down';
const UPLOAD_URL = '/api/upload';

async function measurePing(count = 12) {
  const rtts = [];
  let failed = 0;
  for (let i = 0; i < count; i++) {
    try {
      const t0 = performance.now();
      await fetch(`${CF_DOWN}?bytes=1&_=${Date.now()}_${i}`, { cache: 'no-store', mode: 'cors' });
      rtts.push(performance.now() - t0);
    } catch { failed++; }
  }
  if (rtts.length === 0) throw new Error('Нет ответа от сервера');
  const avg = rtts.reduce((a, b) => a + b, 0) / rtts.length;
  const jitter = rtts.reduce((a, b) => a + Math.abs(b - avg), 0) / rtts.length;
  return { avg: +avg.toFixed(1), jitter: +jitter.toFixed(1), loss: +((failed / count) * 100).toFixed(1) };
}

async function measureDownload(onProgress) {
  const sizes = [100_000, 1_000_000, 10_000_000, 25_000_000];
  const results = [];
  for (const bytes of sizes) {
    try {
      const t0 = performance.now();
      const res = await fetch(`${CF_DOWN}?bytes=${bytes}&_=${Date.now()}`, { cache: 'no-store', mode: 'cors' });
      const reader = res.body.getReader();
      let received = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        received += value.length;
        const elapsed = (performance.now() - t0) / 1000;
        if (elapsed > 0) onProgress((received * 8) / (elapsed * 1_000_000));
      }
      const elapsed = (performance.now() - t0) / 1000;
      results.push((bytes * 8) / (elapsed * 1_000_000));
      if (results[results.length-1] < 5 && bytes >= 1_000_000) break;
    } catch { /* skip */ }
  }
  if (results.length === 0) throw new Error('Ошибка скачивания');
  results.sort((a, b) => a - b);
  const top = results.slice(Math.floor(results.length / 2));
  return +(top.reduce((a, b) => a + b, 0) / top.length).toFixed(2);
}

function uploadChunk(bytes, onProgress) {
  return new Promise((resolve, reject) => {
    const buf = new Uint8Array(bytes);
    const xhr = new XMLHttpRequest();
    xhr.open('POST', UPLOAD_URL);
    xhr.setRequestHeader('Content-Type', 'application/octet-stream');
    const t0 = performance.now();
    xhr.upload.onprogress = (e) => {
      if (e.loaded > 0) {
        const elapsed = (performance.now() - t0) / 1000;
        if (elapsed > 0) onProgress((e.loaded * 8) / (elapsed * 1_000_000));
      }
    };
    xhr.onload = () => resolve((bytes * 8) / ((performance.now() - t0) / 1000) / 1_000_000);
    xhr.onerror = () => reject(new Error('Upload error'));
    xhr.timeout = 30_000;
    xhr.ontimeout = () => reject(new Error('Upload timeout'));
    xhr.send(buf);
  });
}

async function measureUpload(onProgress) {
  const sizes = [500_000, 5_000_000, 20_000_000];
  const results = [];
  for (const bytes of sizes) {
    try {
      const mbps = await uploadChunk(bytes, onProgress);
      results.push(mbps);
      if (mbps < 3 && bytes >= 5_000_000) break;
    } catch { /* skip */ }
  }
  if (results.length === 0) throw new Error('Ошибка загрузки');
  results.sort((a, b) => a - b);
  const top = results.slice(Math.floor(results.length / 2));
  return +(top.reduce((a, b) => a + b, 0) / top.length).toFixed(2);
}

startBtn.addEventListener('click', async () => {
  startBtn.disabled = true;
  dlVal.textContent = '—'; ulVal.textContent = '—';
  pingVal.textContent = '—'; jitterVal.textContent = '—'; lossVal.textContent = '—';
  numDisplay.textContent = '0';
  drawGauge(0, 'dl');

  try {
    phaseLabel.textContent = 'Измерение пинга...';
    drawGauge(0, 'ping');
    const pingResult = await measurePing(12);
    pingVal.textContent   = pingResult.avg;
    jitterVal.textContent = pingResult.jitter;
    lossVal.textContent   = pingResult.loss;

    phaseLabel.textContent = 'Тестирование скачивания...';
    drawGauge(0, 'dl');
    let lastDl = 0;
    const dl = await measureDownload((mbps) => {
      lastDl = lastDl === 0 ? mbps : lastDl * 0.6 + mbps * 0.4;
      drawGauge(lastDl, 'dl');
      numDisplay.textContent = lastDl.toFixed(2);
    });
    await new Promise(r => animateTo(lastDl, dl, 400, val => {
      drawGauge(val, 'dl'); numDisplay.textContent = val.toFixed(2);
    }, r));
    dlVal.textContent = dl.toFixed(2);

    await sleep(200);

    phaseLabel.textContent = 'Тестирование загрузки...';
    drawGauge(0, 'ul');
    numDisplay.textContent = '0';
    let lastUl = 0;
    const ul = await measureUpload((mbps) => {
      lastUl = lastUl === 0 ? mbps : lastUl * 0.6 + mbps * 0.4;
      drawGauge(lastUl, 'ul');
      numDisplay.textContent = lastUl.toFixed(2);
    });
    await new Promise(r => animateTo(lastUl, ul, 400, val => {
      drawGauge(val, 'ul'); numDisplay.textContent = val.toFixed(2);
    }, r));
    ulVal.textContent = ul.toFixed(2);

    await sleep(200);
    phaseLabel.textContent = 'Тест завершён';

  } catch (err) {
    phaseLabel.textContent = 'Ошибка: ' + err.message;
    console.error(err);
  } finally {
    drawGauge(0, 'dl');
    numDisplay.textContent = '0';
    startBtn.disabled = false;
  }
});

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
